name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.23"

jobs:
  go:
    name: go (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # The Go tests load real compiled C# assemblies as golden fixtures.
      # The .NET SDK is a dev/test-only dependency for this step — vmnet
      # itself never needs it at runtime (see ADR 0001).
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build C# test fixtures
        run: dotnet build tests/fixtures/csharp/Fixtures.csproj -c Release

      - name: Build
        # vmnet's core must never depend on cgo: no .NET runtime, no native
        # libraries. This is a hard product guarantee, checked on every OS
        # — the race detector below needs cgo, so it's scoped to Test only.
        run: go build ./...
        env:
          CGO_ENABLED: "0"

      - name: Vet
        run: go vet ./...

      # Windows GitHub-hosted runners don't reliably have a C toolchain for
      # the race detector (cgo); Linux/macOS runners do.
      - name: Test
        if: matrix.os == 'windows-latest'
        run: go test ./... -count=1

      - name: Test (race detector)
        if: matrix.os != 'windows-latest'
        run: go test ./... -race -count=1
